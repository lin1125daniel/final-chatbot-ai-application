<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">FinDash <span class="project-tag">(final project: fiance support)</span></h1>
        <p class="app-subtitle">Daniel Lin • Aviation High School</p>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="btn-refresh" aria-label="Refresh">⟳</button>
      </div>
    </header>

    <main class="dashboard" id="dashboard">
      <section class="balance-wrap">
        <div class="balance-card">
          <div class="balance-label">Total Balance</div>
          <div class="balance-amount" id="balance-amount">$0.00</div>
          <div class="balance-change" id="balance-change">+0.00%</div>
        </div>
        <div class="actions">
          <button class="action-btn">Send</button>
          <button class="action-btn">Receive</button>
          <button class="action-btn">Exchange</button>
        </div>
      </section>

      <section class="cards" id="cards">
        <!-- portfolio cards injected here -->
      </section>

      <section class="transactions">
        <div class="section-title">Recent Activity</div>
        <div id="tx-list" class="tx-list">
          <!-- transactions injected here -->
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
